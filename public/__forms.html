<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NorthForge form detector</title>
  </head>
  <body>
    <!-- Static Netlify Forms blueprint for the OpenNext / Next.js Runtime v5 adapter. -->
    <form name="northforge-booking" method="POST" action="/" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="northforge-booking" />
      <input type="text" name="name" />
      <input type="text" name="businessName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="businessType" />
      <input type="text" name="projectType" />
      <input type="text" name="budget" />
      <input type="text" name="preferredTime" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
